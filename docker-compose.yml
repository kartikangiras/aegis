# =============================================================================
# Aegis — local development stack
#   docker compose up            -> Neo4j + Qdrant
#   docker compose --profile app up  -> full stack (API + web)
# =============================================================================
name: aegis

services:
  # ---------------------------------------------------------------------------
  # Neo4j — Graph store (Cognee graph_engine)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    container_name: aegis-neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-aegispassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Qdrant — Vector store (Cognee vector_engine)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: aegis-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Backend — FastAPI (optional profile)
  # ---------------------------------------------------------------------------
  backend:
    profiles: ["app"]
    build:
      context: ./server
      dockerfile: ../docker/backend.Dockerfile
    container_name: aegis-backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend — Next.js (optional profile)
  # ---------------------------------------------------------------------------
  frontend:
    profiles: ["app"]
    build:
      context: ./client
      dockerfile: ../docker/frontend.Dockerfile
    container_name: aegis-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://aegis-backend:8000
    depends_on:
      - backend

volumes:
  neo4j_data:
  qdrant_data:
